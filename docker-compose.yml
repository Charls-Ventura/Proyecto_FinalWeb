services:

  mongo:
    image: mongo:7.0
    container_name: proyecto_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: proyecto_final_web
    volumes:
      - mongo_data:/data/db
    networks:
      - proyecto_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto_app
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "7000:7000"   # HTTP
      - "50051:50051" # gRPC
    environment:
      APP_PORT: 7000
      GRPC_PORT: 50051
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: proyecto_final_web
      JWT_SECRET: clave-super-secreta-cambiar-en-produccion-2026
    networks:
      - proyecto_net

volumes:
  mongo_data:

networks:
  proyecto_net:
    driver: bridge