<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${titulo}">Dashboard</title>
  <link rel="stylesheet" href="/css/estilos.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="layout-app">

<div th:replace="~{sidebar :: sidebar('dashboard', ${username}, ${rol})}"></div>

<main class="contenido-principal">
  <div class="pagina-header">
    <h1 th:text="${titulo}">Dashboard</h1>
    <div class="estado-conexion">
      <span class="punto-conexion" id="puntoConexion"></span>
      <span id="estadoConexion">Verificando...</span>
    </div>
  </div>

  <div class="dos-columnas" style="margin-bottom: 24px;">
    <section class="tarjeta">
      <h2>Total sincronizados</h2>
      <div class="numero-dashboard" id="totalFormularios">0</div>
      <p class="texto-suave">Formularios guardados en servidor</p>
    </section>

    <section class="tarjeta">
      <h2>Pendientes locales</h2>
      <div class="numero-dashboard" id="totalPendientes">0</div>
      <p class="texto-suave">Registros aún no sincronizados</p>
    </section>
  </div>

  <div class="dos-columnas" style="margin-bottom: 24px;">
    <section class="tarjeta">
      <h2>Sectores únicos</h2>
      <div class="numero-dashboard" id="totalSectores">0</div>
      <p class="texto-suave">Cantidad de sectores encuestados</p>
    </section>

    <section class="tarjeta">
      <h2>Usuarios con registros</h2>
      <div class="numero-dashboard" id="totalUsuarios">0</div>
      <p class="texto-suave">Encuestadores que han enviado datos</p>
    </section>
  </div>

  <div class="dos-columnas">
    <section class="tarjeta">
      <h2>Nivel escolar</h2>
      <div class="contenedor-grafica">
        <canvas id="graficaNivel"></canvas>
      </div>
    </section>

    <section class="tarjeta">
      <h2>Top sectores</h2>
      <div class="contenedor-grafica">
        <canvas id="graficaSectores"></canvas>
      </div>
    </section>
  </div>
</main>

<script src="/js/dashboard.js"></script>
</body>
</html>
