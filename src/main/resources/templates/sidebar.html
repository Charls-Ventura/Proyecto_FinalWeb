<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar(paginaActual, username, rol)">
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
        </div>
        <div class="sidebar-titulo">
            <span class="sidebar-app">Encuestas</span>
            <span class="sidebar-pucmm">PUCMM</span>
        </div>
    </div>

    <div class="sidebar-usuario">
        <div class="sidebar-avatar" th:text="${#strings.substring(username, 0, 1).toUpperCase()}">U</div>
        <div>
            <div class="sidebar-username" th:text="${username}">usuario</div>
            <div class="sidebar-rol" th:text="${rol}">rol</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="/dashboard" th:classappend="${paginaActual == 'dashboard'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Dashboard</span>
        </a>

        <a href="/encuesta" th:classappend="${paginaActual == 'encuesta'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="8" y1="13" x2="16" y2="13"></line>
                <line x1="8" y1="17" x2="16" y2="17"></line>
                <line x1="8" y1="9" x2="10" y2="9"></line>
            </svg>
            <span>Encuesta</span>
        </a>

        <a href="/mapa" th:classappend="${paginaActual == 'mapa'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
                <line x1="9" y1="3" x2="9" y2="18"/>
                <line x1="15" y1="6" x2="15" y2="21"/>
            </svg>
            <span>Mapa</span>
        </a>

        <a href="/admin" th:if="${rol == 'ADMIN'}" th:classappend="${paginaActual == 'admin'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Administración</span>
        </a>

        <a href="/rest-client" th:if="${rol == 'ADMIN'}" th:classappend="${paginaActual == 'rest-client'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 9l3 3-3 3"></path>
                <path d="M13 15h3"></path>
                <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            </svg>
            <span>Cliente REST</span>
        </a>

        <a href="/grpc-client" th:if="${rol == 'ADMIN'}" th:classappend="${paginaActual == 'grpc-client'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3H5a2 2 0 0 0-2 2v4"></path>
                <path d="M15 21h4a2 2 0 0 0 2-2v-4"></path>
                <path d="M21 9V5a2 2 0 0 0-2-2h-4"></path>
                <path d="M3 15v4a2 2 0 0 0 2 2h4"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span>Cliente gRPC</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="/logout" class="sidebar-link sidebar-logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Cerrar sesión</span>
        </a>
    </div>
</aside>
</html>
