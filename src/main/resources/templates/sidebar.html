<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar(paginaActual, username, rol)">
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
        </div>
        <div class="sidebar-titulo">
            <span class="sidebar-app">Encuestas</span>
            <span class="sidebar-pucmm">PUCMM</span>
        </div>
    </div>

    <div class="sidebar-usuario">
        <div class="sidebar-avatar" th:text="${#strings.substring(username, 0, 1).toUpperCase()}">U</div>
        <div>
            <div class="sidebar-username" th:text="${username}">usuario</div>
            <div class="sidebar-rol" th:text="${rol}">rol</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="/dashboard" th:classappend="${paginaActual == 'dashboard'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span>Panel</span>
        </a>
        <a href="/mapa" th:classappend="${paginaActual == 'mapa'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
                <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
            </svg>
            <span>Mapa</span>
        </a>
        <a href="/admin" th:if="${rol == 'ADMIN'}" th:classappend="${paginaActual == 'admin'} ? 'activo'" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Administración</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="/logout" class="sidebar-link sidebar-logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Cerrar sesión</span>
        </a>
    </div>
</aside>
</html>
