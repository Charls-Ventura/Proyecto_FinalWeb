<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Proyecto Final Web</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="pagina-login">
<div class="contenedor-login">
    <div class="tarjeta">
        <div class="encabezado-login">
            <img src="/logo.svg" alt="Logo" class="logo-principal">
            <h1>Proyecto Final Web</h1>
            <p>Encuestas offline con sincronización</p>
        </div>

        <form id="loginForm" class="formulario-simple">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="Digite su usuario" required>

            <label for="password">Clave</label>
            <input type="password" id="password" name="password" placeholder="Digite su clave" required>

            <button type="submit" class="boton boton-principal">Entrar</button>
        </form>

        <div class="nota-login">
            <strong>Usuario por defecto:</strong> admin / admin123
        </div>

        <div id="mensajeLogin" class="mensaje"></div>
    </div>
</div>
<script src="/js/login.js"></script>
</body>
</html>
