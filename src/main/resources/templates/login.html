<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Proyecto Final Web</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="pagina-login">
<div class="contenedor-login">
    <div class="tarjeta">
        <div class="encabezado-login">
            <div class="icono-login">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <h1>Encuestas PUCMM</h1>
            <p>Inicie sesión para continuar</p>
        </div>

        <form id="loginForm" class="formulario-simple">
            <div class="campo">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username"
                       placeholder="Digite su usuario" required autocomplete="username">
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="Digite su contraseña" required autocomplete="current-password">
            </div>

            <button type="submit" class="boton boton-principal boton-completo">Entrar</button>
        </form>

        <div class="nota-login">
            Usuario por defecto: <strong>admin</strong> / <strong>admin123</strong>
        </div>

        <div id="mensajeLogin" class="mensaje oculto"></div>
    </div>
</div>
<script src="/js/login.js"></script>
</body>
</html>
