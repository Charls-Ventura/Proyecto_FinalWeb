<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Administración</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="layout-app">

<div th:replace="~{sidebar :: sidebar('admin', ${username}, ${rol})}"></div>

<main class="contenido-principal">
    <div class="pagina-header">
        <h1>Administración</h1>
    </div>

    <div class="dos-columnas">
        <section class="tarjeta">
            <h2>Crear usuario</h2>
            <form method="post" action="/admin/usuarios" class="formulario-simple">
                <div class="campo">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="campo">
                    <label for="rol">Rol</label>
                    <select id="rol" name="rol">
                        <option value="ENCUESTADOR">Encuestador</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="boton boton-principal">Guardar usuario</button>
            </form>
        </section>

        <section class="tarjeta">
            <h2>Usuarios registrados</h2>
            <div class="tabla-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Rol</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.username}">usuario</td>
                        <td th:text="${usuario.rol}">rol</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <section class="tarjeta" style="margin-top: 24px;">
        <h2>Formularios recibidos</h2>
        <div class="tabla-responsive">
            <table>
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Sector</th>
                    <th>Nivel</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f : ${formularios}">
                    <td th:text="${f.nombre}">Nombre</td>
                    <td th:text="${f.sector}">Sector</td>
                    <td th:text="${f.nivelEscolar}">Nivel</td>
                    <td th:text="${f.usuario}">Usuario</td>
                    <td th:text="${f.fechaRegistro}">Fecha</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
